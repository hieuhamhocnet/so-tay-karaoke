<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 K-Karaoke Pro (Sheet Sync)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #0ea5e9;
            --neon-glow: 0 0 10px rgba(14, 165, 233, 0.5);
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc; font-family: 'Inter', sans-serif;
            min-height: 100vh; padding-top: 30px; padding-bottom: 50px;
        }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px; transition: all 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5), var(--neon-glow); border-color: var(--accent-color); }

        .category-btn {
            background: transparent; color: #94a3b8; border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 8px 20px; margin: 5px; font-weight: 600; transition: all 0.3s;
        }
        .category-btn:hover, .category-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: var(--neon-glow); }

        .search-box { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 30px; padding: 12px 25px; }
        .search-box:focus { background: rgba(0,0,0,0.5); color: white; border-color: var(--accent-color); box-shadow: none; }
        .search-box::placeholder { color: #64748b; }

        .song-title { font-size: 1.1rem; font-weight: 700; color: #38bdf8; }
        .song-artist { font-size: 0.85rem; color: #cbd5e1; }
        
        .btn-play { background: #e11d48; border: none; border-radius: 8px; color: white; font-weight: 600; transition: 0.2s; }
        .btn-play:hover { background: #be123c; transform: scale(1.02); color: white;}

        .btn-favorite { background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 40px; height: 40px; color: #94a3b8; transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .btn-favorite.active { color: #f43f5e; background: rgba(244, 63, 94, 0.2); }
        .btn-favorite:hover { transform: scale(1.1); }

        .modal-content { background: #1e293b; color: white; border: 1px solid var(--glass-border); border-radius: 16px; }
        .modal-header { border-bottom: 1px solid var(--glass-border); }
        .btn-close { filter: invert(1); }
        .lyrics-box { background: #0f172a; padding: 20px; border-radius: 12px; white-space: pre-wrap; max-height: 450px; overflow-y: auto; font-size: 1rem; line-height: 1.6; color: #e2e8f0; border: 1px solid var(--glass-border); }
        
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1060; }

        /* Style Phân Trang */
        .page-btn { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); padding: 8px 16px; margin: 0 4px; border-radius: 8px; transition: 0.3s; font-weight: 600;}
        .page-btn:hover:not(:disabled), .page-btn.active { background: var(--accent-color); border-color: var(--accent-color); color: white;}
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* View Toggle Mode */
        .view-btn { background: transparent; border: 1px solid var(--glass-border); color: #94a3b8; padding: 8px 15px; transition: 0.3s; }
        .view-btn.active { background: var(--glass-border); color: #38bdf8; }
        .view-btn:first-child { border-radius: 8px 0 0 8px; }
        .view-btn:last-child { border-radius: 0 8px 8px 0; border-left: none;}
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h1 class="fw-bold" style="color: #38bdf8; text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);">
            <i class="fa-solid fa-microphone-lines"></i> K-KARAOKE PRO
        </h1>
        <p class="text-muted"><i class="fa-solid fa-cloud-arrow-down"></i> Tự động đồng bộ từ Google Sheets</p>
    </div>

    <div class="row mb-4 justify-content-center">
        <div class="col-md-8 position-relative">
            <i class="fa-solid fa-magnifying-glass position-absolute" style="top: 15px; left: 25px; color: #64748b;"></i>
            <input type="text" id="searchInput" class="form-control search-box" style="padding-left: 45px;" placeholder="Tìm tên bài hát, ca sĩ..." onkeyup="searchSongs()">
        </div>
    </div>

    <div id="loadingArea" class="text-center my-5">
        <div class="loader mb-3"></div>
        <p class="text-info">Đang tải dữ liệu bài hát từ Google Sheets...</p>
    </div>

    <div class="text-center mb-4" id="categoryContainer" style="display: none;">
        <button class="category-btn" id="btn-fav-tab" onclick="showFavorites()">
            <i class="fa-solid fa-heart text-danger"></i> Bài Tủ
        </button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 d-none" id="toolBar">
        <span class="text-muted" id="songCountInfo"></span>
        <div>
            <button class="view-btn active" id="btn-grid" onclick="setViewMode('grid')"><i class="fa-solid fa-border-all"></i></button>
            <button class="view-btn" id="btn-list" onclick="setViewMode('list')"><i class="fa-solid fa-list"></i></button>
        </div>
    </div>

    <div class="row g-4" id="songContainer"></div>

    <div class="d-flex justify-content-center mt-5" id="paginationContainer"></div>
</div>

<div class="modal fade" id="songModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <div>
                    <h4 class="modal-title fw-bold text-info" id="modalTitle">Tên bài hát</h4>
                    <span class="text-muted"><i class="fa-solid fa-user"></i> <span id="modalArtist"></span></span>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <a id="modalLink" href="#" target="_blank" class="btn btn-play w-100 mb-4 py-2">
                    <i class="fa-brands fa-youtube"></i> Mở Bản Karaoke trên YouTube
                </a>
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="fw-bold fs-5">Lời bài hát:</span>
                    <button class="btn btn-sm btn-outline-info" onclick="copyLyrics()"><i class="fa-regular fa-copy"></i> Copy Lời</button>
                </div>
                <div id="modalLyrics" class="lyrics-box"></div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container">
    <div id="actionToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">Thao tác thành công!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRa-3OWpQw1l4r2MI9RQsA1HpmucFChVo-cWR0NfCeXmA9H8DFvZptH_AudYxeq8AKyGdrFYpP2m1C0/pub?gid=0&single=true&output=csv";
    
    // Core State
    let karaokeDB = {}; 
    let currentCategory = ""; 
    let favorites = JSON.parse(localStorage.getItem('karaokeFavs')) || [];
    
    // View & Pagination State
    let currentViewMode = 'grid'; // 'grid' hoặc 'list'
    let currentRenderList = []; 
    let currentPage = 1;
    const ITEMS_PER_PAGE = 10;

    const modal = new bootstrap.Modal(document.getElementById('songModal'));
    const toastInfo = new bootstrap.Toast(document.getElementById('actionToast'));

    function fetchDataFromSheet() {
        if (!SHEET_CSV_URL.includes("http")) {
            document.getElementById('loadingArea').innerHTML = "<p class='text-danger'>❌ Bạn chưa dán Link Google Sheets CSV vào code.</p>";
            return;
        }

        const noCacheUrl = SHEET_CSV_URL + (SHEET_CSV_URL.includes('?') ? '&' : '?') + 't=' + new Date().getTime();

        Papa.parse(noCacheUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                karaokeDB = {}; 

                data.forEach(row => {
                    if (!row.TenBai || row.TenBai.trim() === "") return; 
                    
                    const cat = row.DanhMuc ? row.DanhMuc.trim() : "Chưa Phân Loại";
                    if (!karaokeDB[cat]) karaokeDB[cat] = [];
                    
                    karaokeDB[cat].push({
                        title: row.TenBai.trim(),
                        artist: row.CaSi ? row.CaSi.trim() : "Đang cập nhật",
                        link: row.Link ? row.Link.trim() : "#",
                        lyrics: row.LoiBaiHat ? row.LoiBaiHat.trim() : "Chưa có lời"
                    });
                });

                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('categoryContainer').style.display = 'block';
                document.getElementById('toolBar').classList.remove('d-none');
                
                const categories = Object.keys(karaokeDB);
                if (categories.length > 0) {
                    currentCategory = categories[0]; 
                    renderCategories();
                    renderSongs(karaokeDB[currentCategory], false, 1);
                } else {
                    document.getElementById('songContainer').innerHTML = "<p class='text-center'>Sheet của bạn chưa có bài hát nào!</p>";
                }
            },
            error: function(err) {
                document.getElementById('loadingArea').innerHTML = "<p class='text-danger'>❌ Lỗi tải dữ liệu. Hãy chắc chắn bạn đã Publish To Web dạng CSV.</p>";
            }
        });
    }

    function renderCategories() {
        const container = document.getElementById('categoryContainer');
        const favBtn = document.getElementById('btn-fav-tab');
        container.innerHTML = '';
        container.appendChild(favBtn);
        
        Object.keys(karaokeDB).forEach(category => {
            const btn = document.createElement('button');
            btn.className = `category-btn ${category === currentCategory ? 'active' : ''}`;
            btn.innerText = category;
            btn.onclick = () => {
                currentCategory = category;
                document.getElementById('btn-fav-tab').classList.remove('active');
                document.getElementById('searchInput').value = '';
                renderCategories(); 
                renderSongs(karaokeDB[currentCategory], false, 1); // Reset page 1
            };
            container.appendChild(btn);
        });
    }

    // Logic Chuyển View Mode
    window.setViewMode = function(mode) {
        currentViewMode = mode;
        document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
        document.getElementById('btn-list').classList.toggle('active', mode === 'list');
        renderSongs(currentRenderList, document.getElementById('btn-fav-tab').classList.contains('active'), currentPage);
    };

    // Render Bài Hát + Phân trang
    function renderSongs(songsArr, isFavTab = false, page = 1) {
        currentRenderList = songsArr;
        currentPage = page;
        
        const container = document.getElementById('songContainer');
        container.innerHTML = '';
        
        // Cập nhật thông tin số lượng
        document.getElementById('songCountInfo').innerHTML = `<strong>${songsArr.length}</strong> bài hát`;

        if (songsArr.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center text-muted mt-5">
                    <i class="fa-solid fa-music fs-1 mb-3 opacity-50"></i>
                    <h5>Không tìm thấy bài hát nào.</h5>
                </div>`;
            document.getElementById('paginationContainer').innerHTML = '';
            return;
        }

        // Logic cắt mảng phân trang
        const totalPages = Math.ceil(songsArr.length / ITEMS_PER_PAGE);
        const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
        const paginatedSongs = songsArr.slice(startIndex, startIndex + ITEMS_PER_PAGE);

        paginatedSongs.forEach(song => {
            const isFav = favorites.includes(song.title);
            const safeTitle = song.title.replace(/'/g, "\\'");
            const col = document.createElement('div');
            
            // Xử lý Giao diện tuỳ View Mode
            if (currentViewMode === 'grid') {
                col.className = 'col-md-6 col-lg-4';
                col.innerHTML = `
                    <div class="glass-card p-3 h-100 d-flex flex-column justify-content-between">
                        <div class="d-flex justify-content-between align-items-start" style="cursor: pointer;" onclick="openSongModal('${safeTitle}')">
                            <div>
                                <div class="song-title">${song.title}</div>
                                <div class="song-artist mt-1"><i class="fa-solid fa-microphone-lines fa-sm"></i> ${song.artist}</div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top border-secondary">
                            <button class="btn btn-sm btn-outline-light" onclick="openSongModal('${safeTitle}')">Hát Ngay</button>
                            <button class="btn-favorite ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${safeTitle}')" title="Thêm vào bài tủ">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                        </div>
                    </div>`;
            } else {
                // List Mode
                col.className = 'col-12';
                col.innerHTML = `
                    <div class="glass-card p-3 d-flex flex-row justify-content-between align-items-center w-100" style="transition: 0.2s;">
                        <div class="d-flex align-items-center w-100" style="cursor: pointer;" onclick="openSongModal('${safeTitle}')">
                            <div class="me-3 fs-3 text-info d-none d-sm-block"><i class="fa-solid fa-music"></i></div>
                            <div>
                                <div class="song-title fs-5">${song.title}</div>
                                <div class="song-artist"><i class="fa-solid fa-microphone-lines fa-sm"></i> ${song.artist}</div>
                            </div>
                        </div>
                        <div class="d-flex align-items-center ms-3">
                            <button class="btn btn-sm btn-outline-light me-3 d-none d-md-block text-nowrap" onclick="openSongModal('${safeTitle}')">Hát Ngay</button>
                            <button class="btn-favorite ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${safeTitle}')" title="Thêm vào bài tủ">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                        </div>
                    </div>`;
            }
            container.appendChild(col);
        });

        renderPagination(totalPages);
    }

    // Render Nút Phân Trang
    function renderPagination(totalPages) {
        const container = document.getElementById('paginationContainer');
        container.innerHTML = '';
        
        if (totalPages <= 1) return; // Không cần phân trang nếu <= 10 bài

        // Nút Prev
        let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i class="fa-solid fa-chevron-left"></i></button>`;
        
        // Nút Số trang
        for(let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }

        // Nút Next
        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i class="fa-solid fa-chevron-right"></i></button>`;
        
        container.innerHTML = html;
    }

    window.changePage = function(page) {
        renderSongs(currentRenderList, document.getElementById('btn-fav-tab').classList.contains('active'), page);
        // Cuộn mượt lên trên cùng khu vực bài hát
        document.getElementById('toolBar').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    window.openSongModal = function(songTitle) {
        let targetSong = getAllSongs().find(s => s.title === songTitle);
        if (targetSong) {
            document.getElementById('modalTitle').innerText = targetSong.title;
            document.getElementById('modalArtist').innerText = targetSong.artist;
            document.getElementById('modalLink').href = targetSong.link;
            document.getElementById('modalLyrics').innerText = targetSong.lyrics;
            modal.show();
        }
    };

    window.searchSongs = function() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('btn-fav-tab').classList.remove('active');
        const btns = document.querySelectorAll('.category-btn');
        btns.forEach(b => b.classList.remove('active'));

        if (keyword.trim() === '') {
            renderCategories();
            renderSongs(karaokeDB[currentCategory], false, 1);
            return;
        }
        const results = getAllSongs().filter(song => song.title.toLowerCase().includes(keyword) || song.artist.toLowerCase().includes(keyword));
        renderSongs(results, false, 1); // Tìm kiếm luôn reset về trang 1
    };

    window.showFavorites = function() {
        currentCategory = ""; 
        document.getElementById('searchInput').value = '';
        renderCategories();
        document.getElementById('btn-fav-tab').classList.add('active');
        const favSongs = getAllSongs().filter(s => favorites.includes(s.title));
        renderSongs(favSongs, true, 1); // Reset trang 1
    };

    window.toggleFavorite = function(event, songTitle) {
        event.stopPropagation(); 
        const btn = event.currentTarget;
        if (favorites.includes(songTitle)) {
            favorites = favorites.filter(t => t !== songTitle);
            btn.classList.remove('active');
            showToast("Đã xóa khỏi Bài Tủ!", "text-bg-warning");
            
            // Nếu đang xem tab Bài tủ, xoá xong render lại giữ nguyên trang hiện tại
            if (document.getElementById('btn-fav-tab').classList.contains('active')) {
                const favSongs = getAllSongs().filter(s => favorites.includes(s.title));
                // Nếu trang hiện tại bị rỗng do xoá bài cuối cùng, lùi lại 1 trang
                const maxPage = Math.ceil(favSongs.length / ITEMS_PER_PAGE);
                if(currentPage > maxPage && maxPage > 0) currentPage = maxPage;
                renderSongs(favSongs, true, currentPage);
            }
        } else {
            favorites.push(songTitle);
            btn.classList.add('active');
            showToast("Đã thêm vào Bài Tủ ❤️", "text-bg-success");
        }
        localStorage.setItem('karaokeFavs', JSON.stringify(favorites));
    };

    function getAllSongs() {
        let all = [];
        Object.values(karaokeDB).forEach(arr => all = all.concat(arr));
        return all;
    }

    window.copyLyrics = function() {
        const text = document.getElementById('modalLyrics').innerText;
        navigator.clipboard.writeText(text).then(() => showToast("Đã copy lời bài hát!", "text-bg-primary"));
    };

    function showToast(message, colorClass) {
        const toastEl = document.getElementById('actionToast');
        document.getElementById('toastMessage').innerText = message;
        toastEl.className = `toast align-items-center border-0 ${colorClass}`;
        toastInfo.show();
    }

    window.onload = fetchDataFromSheet;
</script>

</body>
</html>
